# example binds
bind=SUPER,X,killactive
bind=SUPER,B,exec,firefox
bind=SUPER,T,exec,thunar
bind=SUPER,F,fullscreen,1
bind=SUPERSHIFT,F,fullscreen,0

bind=SUPERALT,RETURN,exec,kitty --start-as=fullscreen -o 'font_size=20' --title all_is_kitty
bind=SUPER,RETURN,exec,kitty --title kitty_term

bind=SUPERSHIFT,Q,exit,
bind=SUPER,E,exec,pcmanfm
bind=SUPER,D,exec, rofi -show drun
bind=SUPER,P,pseudo,
bind=SUPERSHIFT,ESCAPE,exec,sudo systemctl suspend

bind=,XF86AudioMute,exec,~/.config/hypr/scripts/volume mute
bind=,XF86AudioLowerVolume,exec,~/.config/hypr/scripts/volume down
bind=,XF86AudioRaiseVolume,exec,~/.config/hypr/scripts/volume up
bind=,XF86AudioMicMute,exec,pactl set-source-mute @DEFAULT_SOURCE@ toggle

bindle=,XF86MonBrightnessUp,exec,~/.config/hypr/scripts/brightness up  # increase screen brightness
bindle=,XF86MonBrightnessDown,exec,~/.config/hypr/scripts/brightness down # decrease screen brightnes
bind=SUPERSHIFT,C,exec,bash ~/.config/hypr/scripts/hyprPicker.sh
bind=SUPERSHIFT,E,exec,wlogout
bind=SUPER, C, togglefloating,

# Screenshot 
bind=SUPERSHIFT,S,exec, grim -g "$(slurp -d)" - | wl-copy
bind=SUPERSHIFT,Print,exec, grim - | wl-copy
# Screen recorder
bind=SUPERSHIFT,R,exec,wf-recorder -g "$(slurp)" -f ~/Recording/recording_$(date +"%Y-%m-%d_%H:%M:%S.mp4")
bind=SUPERSHIFT,E,exec,killall -s SIGINT wf-recorder
# Emoji selector 
bind=SUPER,E,exec,rofi -modi emoji -show emoji

# Blue light filter
bind=,F5,exec,busctl --user -- set-property rs.wl-gammarelay / rs.wl.gammarelay Temperature q 6500
bind=,F6,exec,busctl --user -- set-property rs.wl-gammarelay / rs.wl.gammarelay Temperature q 4500
bind=,F7,exec,busctl --user -- set-property rs.wl-gammarelay / rs.wl.gammarelay Temperature q 2500

