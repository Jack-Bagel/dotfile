# Float Necessary Windows
windowrule=float true, match:class Rofi
windowrule=float true, match:class pavucontrol

windowrule=size 800 500,match:title ^(float_kitty)$
windowrule=float on, match:title ^(full_kitty)$
windowrule=float on, match:title ^(code_env)$
windowrule=tile on, match:title ^(kitty)$
windowrule=float on, match:title ^(fly_is_kitty)$
windowrule=animation popin, match:class Rofi


windowrule = float on, match:class ^(brave)$, match:title ^(Save File)$
windowrule = float on, match:class ^(brave)$, match:title ^(Open File)$
windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org.twosheds.iwgtk)$
windowrule = float on, match:class ^(blueberry.py)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(geeqie)$
windowrule = tile on, match:class ^(neovide)$

# Increase the opacity 
windowrule=opacity 0.92, match:class thunar
windowrule=opacity 0.96, match:class discord
# windowrule=opacity 0.9,VSCodium
# windowrule=opacity 0.88,obsidian

# ^.*nvim.*$
windowrule=opacity 0.97, match:class neovim
bindm=SUPER,mouse:272,movewindow
bindm=SUPER,mouse:273,resizewindow

