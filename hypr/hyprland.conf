# You have to change this based on your monitor 
monitor=eDP-1,1920x1080@60,0x0,1
# Status bar :) 
exec-once=waybar
bind=SUPER,w,exec,waybar
bind=SUPERSHIFT,w,exec,pkill waybar
# Notification 
exec-once=dunst
# Low Battery pop up
exec-once=~/.config/hypr/scripts/battery-notify.sh
# Wallpaper
exec-once=swww-daemon
exec-once=swww img ~/Wallpapers/1.jpg
bind=SUPERALT,1,exec,swww img ~/Wallpapers/1.jpg --transition-type wipe --transition-step 100 --transition-fps 30
bind=SUPERALT,2,exec,swww img ~/Wallpapers/2.jpg --transition-type wipe --transition-step 100 --transition-fps 30
bind=SUPERALT,3,exec,swww img ~/Wallpapers/3.jpg --transition-type wipe --transition-step 100 --transition-fps 30
bind=SUPERALT,4,exec,swww img ~/Wallpapers/4.jpg --transition-type wipe --transition-step 100 --transition-fps 30
# For screen sharing 
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# For keyboard 
exec-once=fcitx5 -D
# My Custom Start Page (Bento)
exec-once=~/.config/hypr/scripts/startpage.sh

# Blue light filter deamon
exec-once=wl-gammarelay

# Bluetooth
exec-once=blueman-applet # Make sure you have installed blueman + blueman-utils

exec-once=nm-applet --indicator

# Screen Sharing 
exec-once=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=~/.config/hypr/scripts/screensharing.sh
input {
  # Remap Capslock -> Ctl for Vim users  
  kb_options = ctrl:nocaps
  kb_layout = ca,us
  kb_variant = multix,
  kb_options = grp:win_space_toggle
  # hyprctl switchxkblayout at-translated-set-2-keyboard next
  # kb_options=caps:escape
  repeat_rate=50
  repeat_delay=240
  touchpad {
    disable_while_typing=1
    natural_scroll=1
    clickfinger_behavior=1
    middle_button_emulation=0
    tap-to-click=1
  }
}
gestures { 
  gesture = 3, horizontal, workspace
  workspace_swipe_min_speed_to_force=5
}

general {
    layout=dwindle
    # sensitivity=1.0 # for mouse cursor TODO: Fix error

    gaps_in=2
    gaps_out=4
    border_size=1
    col.active_border=0xff83a598
    col.inactive_border=0xaa928374

    # apply_sens_to_raw=0 # whether to apply the sensitivity to raw input (e.g. used by games where you aim using your mouse) TODO: Fix error
}

decoration {
    rounding=0
    blur {
        enabled=1
        size=13 # minimum 1
        passes=3 # minimum 1, more passes = more resource intensive.
        new_optimizations = true   

        # Your blur "amount" is size * passes, but high size (over around 5-ish)
        # will produce artifacts.
        # if you want heavy blur, you need to up the passes.
        # the more passes, the more you can up the size without noticing artifacts.
    }
    # drop_shadow=false TODO: Fix error
    # shadow_range=30 TODO: Fix error
    # col.shadow=0xffa7caff #86AAEC TODO: Fix error
    # col.shadow_inactive=0x50000000 TODO: Fix error
}

# Blur for waybar 
# blurls=waybar

animations {
    enabled=1
    bezier=overshot,0.13,0.99,0.29,1.0
    animation=windows,1,5,overshot,slide
    animation=fade,1,7,default
    animation=workspaces,1,5,overshot,slide
    animation=border,1,14,default
}

dwindle {
    pseudotile=1 # enable pseudotiling on dwindle
    force_split=0
    # no_gaps_when_only=false TODO: Fix error
}

master {
  new_on_top=true
  # no_gaps_when_only=false TODO: Fix error 
}

misc {
  disable_hyprland_logo=true
  disable_splash_rendering=true
  mouse_move_enables_dpms=true
  vfr = true
  # hide_cursor_on_touch = true TODO: Fix error
}

